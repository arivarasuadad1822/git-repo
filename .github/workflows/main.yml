name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
         rsync -av --delete ./ /home/ubuntu/github-action-ci-cd/
          cd /home/ubuntu/git-repo
          npm i
          npm run test
          pm2 restart app
